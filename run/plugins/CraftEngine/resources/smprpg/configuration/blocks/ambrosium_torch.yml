items:
  smprpg:ambrosium_torch:
    data:
      item-name: <!i><lang:item.default.ambrosium_torch>
    texture: smprpg:block/aether/ambrosium_torch
    behavior:
      - type: wall_block_item
        block: smprpg:ambrosium_wall_torch
      - type: block_item
        block: smprpg:ambrosium_torch
      - type: block_item
        block: smprpg:ambrosium_wall_torch
  smprpg:ambrosium_standing_torch:
    data:
      item-name: <!i><lang:item.default.ambrosium_torch>
    model:
      type: minecraft:model
      path: smprpg:block/aether/ambrosium_torch
      generation:
        parent: minecraft:block/template_torch
        textures:
          torch: smprpg:block/aether/ambrosium_torch
          particle: smprpg:block/aether/ambrosium_torch
  smprpg:ambrosium_wall_torch:
    data:
      item-name: <!i><lang:item.default.ambrosium_torch>
    model:
      type: minecraft:model
      path: smprpg:block/aether/ambrosium_wall_torch
      generation:
        parent: minecraft:block/template_torch_wall
        textures:
          torch: smprpg:block/aether/ambrosium_torch
          particle: smprpg:block/aether/ambrosium_torch
blocks:
  smprpg:ambrosium_torch:
    loot:
      template: smprpg:loot_table/basic
      arguments:
        item: smprpg:ambrosium_torch
        item-id: ambrosium_torch
    settings:
      template:
        - smprpg:sound/wood
        - smprpg:hardness/none
      overrides:
        push-reaction: destroy
        replaceable: false
        map-color: 29
        luminance: 15
        item: smprpg:ambrosium_torch
    state:
      state: redstone_torch[lit=false]
      entity-renderer:
        item: smprpg:ambrosium_standing_torch
        scale: 1.01
    behavior:
      - type: sturdy_base_block
        direction: down
        support-types:
          - center
      - type: liquid_flowable_block
      - type: simple_particle_block
        tick-interval: 10
        particles:
          - particle: end_rod
            x: 0.5
            y: 0.7
            z: 0.5
          - particle: dust
            color: 255,215,0
            x: 0.5
            y: 0.7
            z: 0.5
  smprpg:ambrosium_wall_torch:
    loot:
      template: smprpg:loot_table/basic
      arguments:
        item: smprpg:ambrosium_torch
        item-id: ambrosium_torch
    settings:
      template:
        - smprpg:sound/wood
        - smprpg:hardness/none
      overrides:
        push-reaction: destroy
        replaceable: false
        map-color: 29
        luminance: 15
        item: smprpg:ambrosium_torch
    behavior:
      - type: directional_attached_block
      - type: liquid_flowable_block
      - type: wall_torch_particle_block
        particles:
          - particle: end_rod
            x: 0.27
            y: 0.42
            z: 0.27
          - particle: dust
            color: 255,215,0
            x: 0.27
            y: 0.42
            z: 0.27
    states:
      properties:
        facing:
          type: horizontal_direction
      appearances:
        north:
          state: redstone_wall_torch[facing=north,lit=false]
          entity-renderer:
            item: smprpg:ambrosium_wall_torch
            scale: 1.04
            yaw: 90
            translation: -0.02,0.01,0
        east:
          state: redstone_wall_torch[facing=east,lit=false]
          entity-renderer:
            item: smprpg:ambrosium_wall_torch
            scale: 1.04
            yaw: 180
            translation: -0.02,0.01,0
        west:
          state: redstone_wall_torch[facing=west,lit=false]
          entity-renderer:
            item: smprpg:ambrosium_wall_torch
            scale: 1.04
            translation: -0.02,0.01,0
        south:
          state: redstone_wall_torch[facing=south,lit=false]
          entity-renderer:
            item: smprpg:ambrosium_wall_torch
            scale: 1.04
            yaw: -90
            translation: -0.02,0.01,0
      variants:
        facing=north:
          appearance: north
        facing=east:
          appearance: east
        facing=west:
          appearance: west
        facing=south:
          appearance: south

recipes:
  smprpg:ambrosium_torch:
    type: shaped
    pattern:
      - A
      - B
    ingredients:
      A: smprpg:ambrosium
      B: minecraft:breeze_rod
    result:
      id: smprpg:ambrosium_torch
      count: 4