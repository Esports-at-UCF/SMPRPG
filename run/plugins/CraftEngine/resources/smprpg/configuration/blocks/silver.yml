items:
  smprpg:silver_ore:
    data:
      item-name: <!i><lang:item.smprpg.silver_ore>
    model: smprpg:block/overworld/silver_ore
    behavior:
      type: block_item
      block: smprpg:silver_ore
  smprpg:deepslate_silver_ore:
    data:
      item-name: <!i><lang:item.smprpg.deepslate_silver_ore>
    model: smprpg:block/overworld/deepslate_silver_ore
    behavior:
      type: block_item
      block: smprpg:deepslate_silver_ore
  smprpg:raw_silver_block:
    data:
      item-name: <!i><lang:item.smprpg.raw_silver_block>
    model: smprpg:block/overworld/raw_silver_block
    behavior:
      type: block_item
      block: smprpg:raw_silver_block
  smprpg:silver_block:
    data:
      item-name: <!i><lang:item.smprpg.silver_block>
    model: smprpg:block/overworld/silver_block
    behavior:
      type: block_item
      block: smprpg:silver_block

  smprpg:raw_silver:
    data:
      item-name: <!i><lang:item.smprpg.raw_silver>
      pdc:
        smprpg:item-type: raw_silver
        smprpg:sell-value: 15
    texture: smprpg:item/materials/raw_silver
  smprpg:silver_nugget:
    data:
      item-name: <!i><lang:item.smprpg.silver_nugget>
      pdc:
        smprpg:item-type: silver_nugget
        smprpg:sell-value: 5
    texture: smprpg:item/materials/silver_nugget
  smprpg:silver_ingot:
    data:
      item-name: <!i><lang:item.smprpg.silver_ingot>
      pdc:
        smprpg:item-type: silver_ingot
        smprpg:sell-value: 50
    texture: smprpg:item/materials/silver_ingot
  smprpg:enchanted_silver:
    data:
      item-name: <!i><lang:item.smprpg.enchanted_silver_ingot>
      pdc:
        smprpg:item-type: enchanted_silver_ingot
    texture: smprpg:item/materials/silver_ingot
  smprpg:silver_singularity:
    data:
      item-name: <!i><lang:item.smprpg.silver_singularity>
      pdc:
        smprpg:item-type: silver_singularity
    texture: smprpg:item/materials/silver_ingot
  smprpg:enchanted_silver_block_display:
    data:
      item-name: <!i><lang:item.smprpg.enchanted_silver_block_display>
    model: smprpg:block/compact/enchanted_silver_block
  smprpg:enchanted_silver_block:
    data:
      item-name: <!i><lang:item.smprpg.enchanted_silver_block>
      pdc:
        smprpg:item-type: enchanted_silver_block
    model: smprpg:block/overworld/silver_block
    behavior:
      type: block_item
      block:
        state:
          state: barrier
          entity-renderer:
            - type: item_display
              item: smprpg:enchanted_silver_block_display
        settings:
          template:
            - smprpg:settings/metal_block
            - smprpg:data/breaking_power_1
            - smprpg:data/beacon_usable
          overrides:
            instrument: flute
            map-color: 31
          merges:
            tags: [ "smprpg:custom_instrument" ]

blocks:
  smprpg:silver_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/silver_ore
    settings:
      template:
      - smprpg:settings/ore
      - smprpg:data/breaking_power_1

  smprpg:deepslate_silver_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/deepslate_silver_ore
    settings:
      template:
      - smprpg:settings/deepslate_ore
      - smprpg:data/breaking_power_3

  smprpg:raw_silver_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/raw_silver_block
    settings:
      template:
        - smprpg:settings/raw_metal_block
        - smprpg:data/breaking_power_1
      overrides:
        map-color: 31

  smprpg:silver_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/silver_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_1
        - smprpg:data/beacon_usable
      overrides:
        instrument: flute
        map-color: 31
      merges:
        tags: ["smprpg:custom_instrument"]

placed-features:
  smprpg:ore_silver:
    environment:
      - minecraft:overworld
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 10
        targets:
          - state:
              Name: smprpg:silver_ore
            target:
              predicate_type: minecraft:tag_match
              tag: minecraft:stone_ore_replaceables
          - state:
              Name: smprpg:deepslate_silver_ore
            target:
              predicate_type: minecraft:tag_match
              tag: minecraft:deepslate_ore_replaceables
          - state:
              Name: smprpg:grimstone_silver_ore
            target:
              predicate_type: minecraft:tag_match
              tag: smprpg:grimstone_ore_replaceables
    placement:
      - type: minecraft:count
        count: 18
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 96
          min_inclusive:
            absolute: -32

recipes:
  # Crafting Grid
  smprpg:silver_ingot_from_nuggets:
    type: shaped
    category: misc
    group: silver
    ingredients:
      S: smprpg:silver_nugget
    pattern:
      - SSS
      - SSS
      - SSS
    result:
      id: smprpg:silver_ingot
  smprpg:silver_nuggets_from_ingot:
    type: shapeless
    category: misc
    group: silver
    ingredients:
      S: smprpg:silver_ingot
    result:
      id: smprpg:silver_nugget
      count: 9

  # Smelting/Blasting
  smprpg:silver_from_smelting_raw_silver:
    type: smelting
    experience: 0.0
    category: misc
    group: silver
    time: 200
    ingredient: smprpg:raw_silver
    result:
      id: smprpg:silver_ingot
