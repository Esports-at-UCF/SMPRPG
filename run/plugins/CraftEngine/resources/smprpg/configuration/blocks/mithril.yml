blocks:
  smprpg:sparse_mithril_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/sparse_mithril_ore
    settings:
      template:
      - smprpg:settings/solid_1x1x1
      - smprpg:data/breaking_power_4
      - smprpg:sound/blackstone
      overrides:
        hardness: 6.25
        resistance: 10.0
        instrument: basedrum
        map-color: 39
        tags: ["minecraft:mineable/pickaxe"]
  smprpg:mithril_ore:
