placed-features:
  smprpg:ore_mithril:
    environment:
      - minecraft:overworld
    feature:
      type: minecraft:geode
      config:
        blocks:
          filling_provider:
            type: minecraft:weighted_state_provider
            entries:
              - weight: 80
                data:
                  Name: smprpg:dense_mithril_ore
              - weight: 7
                data:
                  Name: smprpg:titanium_ore
          inner_layer_provider:
            type: minecraft:simple_state_provider
            state:
              Name: smprpg:mithril_ore
          alternate_inner_layer_provider:
            type: minecraft:simple_state_provider
            state:
              Name: smprpg:mithril_ore
          middle_layer_provider:
            type: minecraft:simple_state_provider
            state:
              Name: smprpg:mithril_ore
          outer_layer_provider:
            type: minecraft:simple_state_provider
            state:
              Name: smprpg:sparse_mithril_ore
          inner_placements:
            - Name: smprpg:dense_mithril_ore
          cannot_replace: '#minecraft:features_cannot_replace'
          invalid_blocks: '#smprpg:geode_invalid_blocks'
        invalid_blocks_threshold: 1
        layers:
          filling: 1.7
          inner_layer: 1
          middle_layer: 2
          outer_layer: 3
        crack:
          generate_crack_chance: 0
          base_crack_size: 0
          crack_point_offset: 0
        use_potential_placements_chance: 0.2
        use_alternate_layer0_chance: 0
        min_gen_offset: -16
        max_gen_offset: 16
    placement:
      - type: minecraft:rarity_filter
        chance: 12
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:uniform
          max_inclusive:
            absolute: 64
          min_inclusive:
            above_bottom: 6
      - type: minecraft:biome
