        states:
          template: smprpg:block_state/non_tintable_leaves
          arguments:
            model_path: smprpg:block/aether/crystal_leaves
            texture_path: smprpg:block/aether/crystal_leaves
  smprpg:crystal_fruit_leaves:
    data:
      item-name: <!i><lang:item.smprpg.crystal_fruit_leaves>
