          arguments:
            model_path: smprpg:block/aether/crystal_fruit_leaves
            texture_path: smprpg:block/aether/crystal_fruit_leaves
  smprpg:skyroot_trapdoor:
    data:
      item-name: <!i><lang:item.smprpg.skyroot_trapdoor>
      pdc:
        smprpg:item-type: skyroot_trapdoor
    settings:
      fuel-time: 300
    model: smprpg:block/aether/skyroot_trapdoor_bottom
    behavior:
      type: block_item
      block:
        behavior:
          type: trapdoor_block
          can-open-with-hand: true
          can-open-by-wind-charge: true
          sounds:
            open: minecraft:block.wooden_trapdoor.open
            close: minecraft:block.wooden_trapdoor.close
        loot:
          template: smprpg:loot_table/self
        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:data/breaking_power_5
          overrides:
            map-color: 22
            instrument: bass
            hardness: 10.0
            resistance: 3.0
            burnable: true
            tags:
              - minecraft:mineable/axe
              - minecraft:trapdoors
        states:
          template: smprpg:block_state/trapdoor
          arguments:
            base_block: acacia_trapdoor
            model_bottom_path: smprpg:block/aether/skyroot_trapdoor_bottom
            model_bottom_generation:
              parent: minecraft:block/template_orientable_trapdoor_bottom
              textures:
                texture: smprpg:block/aether/skyroot_trapdoor
            model_open_path: smprpg:block/aether/skyroot_trapdoor_open
            model_open_generation:
              parent: minecraft:block/template_orientable_trapdoor_open
              textures:
                texture: smprpg:block/aether/skyroot_trapdoor
            model_top_path: smprpg:block/aether/skyroot_trapdoor_top
            model_top_generation:
              parent: minecraft:block/template_orientable_trapdoor_top
              textures:
                texture: smprpg:block/aether/skyroot_trapdoor
  smprpg:skyroot_door:
    data:
      item-name: <!i><lang:item.smprpg.skyroot_door>
      pdc:
        smprpg:item-type: skyroot_door
    settings:
      fuel-time: 200
    texture: smprpg:item/aether/skyroot_door
    behavior:
      type: double_high_block_item
      block:
        behavior:
          type: door_block
          can-open-with-hand: true
          can-open-by-wind-charge: true
          sounds:
            open: minecraft:block.wooden_door.open
            close: minecraft:block.wooden_door.close
        loot:
          template: smprpg:loot_table/door
        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:data/breaking_power_5
          overrides:
            push-reaction: destroy
            map-color: 22
            instrument: bass
            hardness: 10.0
            resistance: 3.0
            burnable: true
            tags:
              - minecraft:wooden_doors
              - minecraft:doors
              - minecraft:mineable/axe
        states:
          template: smprpg:block_state/door
          arguments:
            base_block: oak_door
            model_top_left_path: smprpg:block/aether/skyroot_door_top_left
            model_top_left_generation:
              parent: minecraft:block/door_top_left
              textures: &textures
                bottom: smprpg:block/aether/skyroot_door_bottom
                top: smprpg:block/aether/skyroot_door_top
            model_top_right_path: smprpg:block/aether/skyroot_door_top_right
            model_top_right_generation:
              parent: minecraft:block/door_top_right
              textures: *textures
            model_top_left_open_path: smprpg:block/aether/skyroot_door_top_left_open
            model_top_left_open_generation:
              parent: minecraft:block/door_top_left_open
              textures: *textures
            model_top_right_open_path: smprpg:block/aether/skyroot_door_top_right_open
            model_top_right_open_generation:
              parent: minecraft:block/door_top_right_open
              textures: *textures
            model_bottom_left_path: smprpg:block/aether/skyroot_door_bottom_left
            model_bottom_left_generation:
              parent: minecraft:block/door_bottom_left
              textures: *textures
            model_bottom_right_path: smprpg:block/aether/skyroot_door_bottom_right
            model_bottom_right_generation:
              parent: minecraft:block/door_bottom_right
              textures: *textures
            model_bottom_left_open_path: smprpg:block/aether/skyroot_door_bottom_left_open
            model_bottom_left_open_generation:
              parent: minecraft:block/door_bottom_left_open
              textures: *textures
            model_bottom_right_open_path: smprpg:block/aether/skyroot_door_bottom_right_open
            model_bottom_right_open_generation:
              parent: minecraft:block/door_bottom_right_open
              textures: *textures
  smprpg:skyroot_fence_gate:
