  smprpg:skyroot_planks:
    settings:
      fuel-time: 300
      tags:
        - minecraft:planks
        - minecraft:wooden_tool_materials
    data:
      item-name: <!i><lang:item.smprpg.skyroot_planks>
    model: smprpg:block/aether/skyroot_planks
    behavior:
      type: block_item
      block:
        settings:
          template:
            - smprpg:settings/planks
            - smprpg:sound/cherry_wood
            - smprpg:data/breaking_power_5
          overrides:
            hardness: 10.0
        loot:
          template: smprpg:loot_table/self
        state:
          model:
            template: smprpg:model/simplified_cube_all
            arguments:
              path: smprpg:block/aether/skyroot_planks
          auto-state: solid
  smprpg:skyroot_sapling:
    settings:
      fuel-time: 100
    data:
      item-name: <!i><lang:item.smprpg.skyroot_sapling>
      pdc:
        smprpg:item-type: skyroot_sapling
        smprpg:sell-value: 2
    texture: smprpg:block/aether/skyroot_sapling
    behavior:
      type: block_item
      block:
        settings:
          template:
            - smprpg:settings/sapling
        behaviors:
          - type: liquid_flowable_block
          - type: bush_block
            bottom-block-tags:
              - smprpg:aether_dirt
          - type: sapling_block
            feature: smprpg:skyroot_wide_tree
            bone-meal-success-chance: 0.45
        loot:
          template: smprpg:loot_table/self
        states:
          properties:
            stage:
              type: int
              smprpg-value: 0
              range: 0~3
          appearances:
            default:
              auto-state: sapling
              model:
                path: smprpg:block/aether/skyroot_sapling
                generation:
                  parent: minecraft:block/cross
                  textures:
                    cross: smprpg:block/aether/skyroot_sapling
  smprpg:crystal_sapling_display:
    settings:
      fuel-time: 150
    data:
      item-name: <!i><lang:item.smprpg.crystal_sapling_display>
    model:
      path: smprpg:block/aether/crystal_sapling
      generation:
        parent: minecraft:block/cross
        textures:
          cross: smprpg:block/aether/crystal_sapling
  smprpg:crystal_sapling:
    settings:
      fuel-time: 150
    data:
      item-name: <!i><lang:item.smprpg.crystal_sapling>
      pdc:
        smprpg:item-type: crystal_sapling
        smprpg:sell-value: 2
    texture: smprpg:block/aether/crystal_sapling
    behavior:
      type: block_item
      block:
        settings:
          template: smprpg:settings/sapling
        behaviors:
          - type: liquid_flowable_block
          - type: bush_block
            bottom-block-tags:
              - smprpg:aether_dirt
          - type: sapling_block
            feature: smprpg:crystal_tree
            bone-meal-success-chance: 0.45
        loot:
          template: smprpg:loot_table/self
        states:
          properties:
            stage:
              type: int
              smprpg-value: 0
              range: 0~7
          appearances:
            default:
              state: spruce_sapling[stage=1]
              entity-renderer:
                - type: item_display
                  item: smprpg:crystal_sapling_display
  smprpg:skyroot_leaves:
    material: oak_leaves
    data:
      item-name: <!i><lang:item.smprpg.skyroot_leaves>
      block-state: smprpg:skyroot_leaves[persistent=true,waterlogged=false,distance=7]
      pdc:
        smprpg:item-type: skyroot_leaves
    model:
      type: minecraft:model
      path: smprpg:item/custom/skyroot_leaves
      generation:
        parent: smprpg:block/aether/skyroot_leaves
      tints:
        - type: minecraft:constant
          value: [0.69, 1.0, 0.8]
    behavior:
      type: block_item
      block:
        behavior:
          type: leaves_block
        loot:
          template: smprpg:loot_table/leaves
          arguments:
            leaves_namespace: smprpg
            leaves_id: skyroot_leaves
            sapling_namespace: smprpg
            sapling_id: skyroot_sapling
        settings:
          template:
           - smprpg:settings/leaves
           - smprpg:sound/cherry_leaves
          overrides:
            hardness: 1.0
        states:
          template: smprpg:block_state/tintable_leaves
          arguments:
            model_path: smprpg:block/aether/skyroot_leaves
            texture_path: smprpg:block/aether/skyroot_leaves
  smprpg:crystal_leaves:
    data:
      item-name: <!i><lang:item.smprpg.crystal_leaves>
      block-state: smprpg:crystal_leaves[persistent=true,waterlogged=false,distance=7]
