        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:hardness/planks
            - smprpg:data/breaking_power_5
          overrides:
            map-color: 22
            hardness: 10.0
            instrument: bass
            burnable: true
            tags:
              - minecraft:fence_gates
              - minecraft:mineable/axe
              - minecraft:unstable_bottom_center
        states:
          template: smprpg:block_state/fence_gate
          arguments:
            base_block: oak_fence_gate
            model_fence_gate_path: smprpg:block/aether/skyroot_fence_gate
            model_fence_gate_generation:
              parent: minecraft:block/template_fence_gate
              textures: &textures
                texture: smprpg:block/aether/skyroot_planks
            model_fence_gate_open_path: smprpg:block/aether/skyroot_fence_gate_open
            model_fence_gate_open_generation:
              parent: minecraft:block/template_fence_gate_open
              textures: *textures
            model_fence_gate_wall_path: smprpg:block/aether/skyroot_fence_gate_wall
            model_fence_gate_wall_generation:
              parent: minecraft:block/template_fence_gate_wall
              textures: *textures
            model_fence_gate_wall_open_path: smprpg:block/aether/skyroot_fence_gate_wall_open
            model_fence_gate_wall_open_generation:
              parent: minecraft:block/template_fence_gate_wall_open
              textures: *textures
  smprpg:skyroot_slab:
    data:
      item-name: <!i><lang:item.smprpg.skyroot_slab>
      pdc:
        smprpg:item-type: skyroot_slab
        smprpg:sell-value: 1
    settings:
      fuel-time: 150
    model: smprpg:block/aether/skyroot_slab
    behavior:
      type: block_item
      block:
        behaviors:
          type: slab_block
        loot:
          template: smprpg:loot_table/slab
        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:burn_data/planks
            - smprpg:hardness/planks
            - smprpg:data/breaking_power_5
          overrides:
            hardness: 10.0
            map-color: 22
            instrument: bass
            tags:
              - minecraft:wooden_slabs
              - minecraft:slabs
              - minecraft:mineable/axe
        states:
          template: smprpg:block_state/slab
          arguments:
            base_block: petrified_oak_slab
            model_bottom_path: smprpg:block/aether/skyroot_slab
            model_bottom_generation:
              parent: minecraft:block/slab
              textures: &textures
                bottom: smprpg:block/aether/skyroot_planks
                side: smprpg:block/aether/skyroot_planks
                top: smprpg:block/aether/skyroot_planks
            model_top_path: smprpg:block/aether/skyroot_slab_top
            model_top_generation:
              parent: minecraft:block/slab_top
              textures: *textures
            model_double_path: smprpg:block/aether/skyroot_planks
  smprpg:skyroot_stairs:
    model: smprpg:block/aether/skyroot_stairs
    data:
      item-name: <!i><lang:item.smprpg.skyroot_stairs>
      pdc:
        smprpg:item-type: skyroot_stairs
    settings:
      fuel-time: 300
    behavior:
      type: block_item
      block:
        loot:
          template: smprpg:loot_table/self
        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:hardness/planks
            - smprpg:burn_data/planks
            - smprpg:data/breaking_power_5
          overrides:
            hardness: 10.0
            map-color: 22
            instrument: bass
            tags:
              - minecraft:mineable/axe
              - minecraft:stairs
              - minecraft:wooden_stairs
        behavior:
          type: stairs_block
        states:
          template: smprpg:block_state/stairs
          arguments:
            base_block: cut_copper_stairs
            model_stairs_inner_path: smprpg:block/aether/skyroot_stairs_inner
            model_stairs_inner_generation:
              parent: minecraft:block/inner_stairs
              textures: &textures
                bottom: &block_texture smprpg:block/aether/skyroot_planks
                side: *block_texture
                top: *block_texture
            model_stairs_outer_path: smprpg:block/aether/skyroot_stairs_outer
            model_stairs_outer_generation:
              parent: minecraft:block/outer_stairs
              textures: *textures
            model_stairs_path: smprpg:block/aether/skyroot_stairs
            model_stairs_generation:
              parent: minecraft:block/stairs
              textures: *textures
  smprpg:skyroot_pressure_plate:
    model: smprpg:block/aether/skyroot_pressure_plate
    data:
      item-name: <!i><lang:item.smprpg.skyroot_pressure_plate>
      pdc:
        smprpg:item-type: skyroot_pressure_plate
        smprpg:sell-value: 4
    settings:
      fuel-time: 300
    behavior:
      type: block_item
      block:
        loot:
          template: smprpg:loot_table/self
        settings:
          template:
            - smprpg:sound/cherry_wood
            - smprpg:hardness/planks
            - smprpg:data/breaking_power_5
          overrides:
            hardness: 2.5
            burnable: true
            push-reaction: destroy
            map-color: 22
            instrument: bass
            tags:
              - minecraft:mineable/axe
              - minecraft:wall_post_override
              - minecraft:wooden_pressure_plates
              - minecraft:pressure_plates
        behaviors:
          type: pressure_plate_block
          sensitivity: all
          pressed-time: 20
          sounds:
            on: minecraft:block.wooden_pressure_plate.click_on
            off: minecraft:block.wooden_pressure_plate.click_off
        states:
          template: smprpg:block_state/pressure_plate
          arguments:
            normal_state: light_weighted_pressure_plate:0
            powered_state: light_weighted_pressure_plate:1
            model_normal_path: smprpg:block/aether/skyroot_pressure_plate
            model_normal_generation:
              parent: minecraft:block/pressure_plate_up
              textures:
                texture: smprpg:block/aether/skyroot_planks
            model_powered_path: smprpg:block/aether/skyroot_pressure_plate_down
            model_powered_generation:
              parent: minecraft:block/pressure_plate_down
              textures:
                texture: smprpg:block/aether/skyroot_planks
  smprpg:crystal_fruit:
    data:
      item-name: <!i><lang:item.smprpg.crystal_fruit>
    texture: smprpg:item/crop/crystal_fruit
    behavior:
      - type: compostable_item
        chance: 0.65

