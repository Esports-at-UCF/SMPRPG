items:
  smprpg:orichalcum_ore:
    data:
      item-name: <!i><lang:item.smprpg.orichalcum_ore>
    model: smprpg:block/nether/orichalcum_ore
    behavior:
      type: block_item
      block: smprpg:orichalcum_ore
  smprpg:raw_orichalcum_block:
    data:
      item-name: <!i><lang:item.smprpg.orichalcum_block>
    model: smprpg:block/nether/raw_orichalcum_block
    behavior:
      type: block_item
      block: smprpg:raw_orichalcum_block
  smprpg:orichalcum_block:
    data:
      item-name: <!i><lang:item.smprpg.orichalcum_block>
    model: smprpg:block/nether/orichalcum_block
    behavior:
      type: block_item
      block: smprpg:orichalcum_block
  smprpg:raw_orichalcum:
    data:
      item-name: <!i><lang:item.smprpg.raw_orichalcum>
      pdc:
        smprpg:item-type: raw_orichalcum
    model: smprpg:item/materials/raw_orichalcum
  smprpg:orichalcum_ingot:
    data:
      item-name: <!i><lang:item.smprpg.orichalcum_ingot>
      pdc:
        smprpg:item-type: orichalcum_ingot
    model: smprpg:item/materials/orichalcum_ingot


blocks:
  smprpg:orichalcum_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/orichalcum_ore
    settings:
      template:
      - smprpg:settings/nether_ore
      - smprpg:data/breaking_power_6
      overrides:
        hardness: 75.0
        resistance: 25.0

  smprpg:raw_orichalcum_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/raw_orichalcum_block
    settings:
      template:
        - smprpg:sound/stone
        - smprpg:data/breaking_power_6
      overrides:
        hardness: 50.0
        resistance: 25.0
        tags: ["minecraft:mineable/pickaxe"]

  smprpg:orichalcum_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/orichalcum_block
    settings:
      template:
      - smprpg:sound/metal
      - smprpg:data/breaking_power_6
      - smprpg:data/beacon_usable
      merges:
        tags: ["minecraft:mineable/pickaxe", "smprpg:custom_instrument"]
      overrides:
        hardness: 50.0
        resistance: 25.0

placed-features:
  smprpg:ore_orichalcum:
    environment:
      - minecraft:the_nether
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 8
        targets:
          - state:
              Name: smprpg:orichalcum_ore
            target:
              predicate_type: minecraft:block_match
              block: minecraft:netherrack
    placement:
      - type: minecraft:count
        count: 6
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 114
          min_inclusive:
            absolute: 64

recipes:
  smprpg:orichalcum_from_blasting_raw_orichalcum:
    type: blasting
    experience: 0.0
    category: misc
    group: orichalcum
    time: 1600
    ingredient: smprpg:raw_orichalcum
    result:
      id: smprpg:orichalcum_ingot
      count: 1
  smprpg:orichalcum_from_blasting_orichalcum_ore:
    type: blasting
    experience: 0.0
    category: misc
    group: tin
    time: 1600
    ingredient: smprpg:orichalcum_ore
    result:
      id: smprpg:orichalcum_ingot
      count: 1