blocks:
  smprpg:holystone_bricks:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/holystone_bricks
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/stone
        - smprpg:sound/holystone
      map-color: 22
      overrides:
        hardness: 6.0
        resistance: 0.5
  smprpg:aerogel:
    state:
      state: barrier
      entity-renderer:
        - type: item_display
          item: smprpg:aerogel
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/aercloud
      overrides:
        map-color: 31
        hardness: 1.0
        resistance: 6000.0
  smprpg:ambrosium_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/ambrosium_block
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/metal_block
      overrides:
        map-color: 18
  smprpg:zanite_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/zanite_block
    loot:
