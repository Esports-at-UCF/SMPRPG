          path: smprpg:block/aether/rainbow_wool
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/aercloud
      overrides:
        map-color: 31
        hardness: 1.0
        resistance: 6000.0

items#redstone:
  smprpg:holystone_button:
    model:
      type: minecraft:model
      path: smprpg:item/custom/holystone_button
      generation:
        parent: minecraft:block/button_inventory
        textures:
          texture: smprpg:block/aether/holystone
    data:
      item-name: <!i><lang:item.smprpg.holystone_button>
      pdc:
        smprpg:item-type: holystone_button
        smprpg:sell-value: 2
    behavior:
      type: block_item
      block: smprpg:holystone_button
  smprpg:holystone_button_pressed:
    data:
      item-name: <!i><lang:item.smprpg.holystone_button>
    model:
      type: minecraft:model
      path: smprpg:block/aether/holystone_button_pressed
      generation:
        parent: minecraft:block/button_pressed
        textures:
          texture: smprpg:block/aether/holystone
  smprpg:holystone_button_not_pressed:
    data:
      item-name: <!i><lang:item.smprpg.holystone_button>
    model:
      type: minecraft:model
      path: smprpg:block/aether/holystone_button_not_pressed
      generation:
        parent: minecraft:block/button
        textures:
          texture: smprpg:block/aether/holystone
  smprpg:holystone_pressure_plate:
    model: smprpg:block/aether/holystone_pressure_plate
    data:
      item-name: <!i><lang:item.smprpg.holystone_pressure_plate>
      pdc:
        smprpg:item-type: holystone_pressure_plate
        smprpg:sell-value: 4
    behavior:
      type: block_item
      block:
        loot:
          template: smprpg:loot_table/self
        settings:
          template:
            - smprpg:sound/holystone
          overrides:
            hardness: 0.5
            resistance: 0.5
            burnable: false
            push-reaction: destroy
            map-color: 22
            instrument: basedrum
            tags:
              - minecraft:mineable/pickaxe
              - minecraft:wall_post_override
              - minecraft:stone_pressure_plates
              - minecraft:pressure_plates
        behaviors:
          type: pressure_plate_block
          sensitivity: mob
          pressed-time: 10
          sounds:
            on: minecraft:block.stone_pressure_plate.click_on
            off: minecraft:block.stone_pressure_plate.click_off
        states:
          template: smprpg:block_state/pressure_plate
          arguments:
            normal_state: light_weighted_pressure_plate:2
            powered_state: light_weighted_pressure_plate:3
            model_normal_path: smprpg:block/aether/holystone_pressure_plate
            model_normal_generation:
              parent: minecraft:block/pressure_plate_up
              textures:
                texture: smprpg:block/aether/holystone
            model_powered_path: smprpg:block/aether/holystone_pressure_plate_down
            model_powered_generation:
              parent: minecraft:block/pressure_plate_down
              textures:
                texture: smprpg:block/aether/holystone

blocks#redstone:
  smprpg:holystone_button:
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:sound/holystone
        - smprpg:hardness/button
      overrides:
        burnable: true
        push-reaction: destroy
        map-color: 22
        instrument: basedrum
        tags:
          - minecraft:buttons
          - minecraft:mineable/pickaxe
          - minecraft:stone_buttons
    behaviors:
      - type: liquid_flowable_block
      - type: face_attached_horizontal_directional_block
      - type: button_block
        ticks-to-stay-pressed: 10
        can-be-activated-by-arrows: false
        sounds:
          on: minecraft:block.stone_button.click_on
          off: minecraft:block.stone_button.click_off
    states:
      template: smprpg:block_state/button
      arguments:
        base_block: stone_button
        pressed_item: smprpg:holystone_button_pressed
        not_pressed_item: smprpg:holystone_button_not_pressed

