items:
  smprpg:extinguished_torch:
    data:
      item-name: <!i><lang:item.default.extinguished_torch>
    texture: smprpg:block/aether/extinguished_torch
    behavior:
      - type: wall_block_item
        block: smprpg:extinguished_wall_torch
      - type: block_item
        block: smprpg:extinguished_torch
      - type: block_item
        block: smprpg:extinguished_wall_torch
  smprpg:extinguished_standing_torch:
    data:
      item-name: <!i><lang:item.default.extinguished_torch>
    model:
      type: minecraft:model
      path: smprpg:block/aether/extinguished_torch
      generation:
        parent: minecraft:block/template_torch
        textures:
          torch: smprpg:block/aether/extinguished_torch
          particle: smprpg:block/aether/extinguished_torch
  smprpg:extinguished_wall_torch:
    data:
      item-name: <!i><lang:item.default.extinguished_torch>
    model:
      type: minecraft:model
      path: smprpg:block/aether/extinguished_wall_torch
      generation:
        parent: minecraft:block/template_torch_wall
        textures:
          torch: smprpg:block/aether/extinguished_torch
blocks:
  smprpg:extinguished_torch:
    loot:
      template: smprpg:loot_table/basic
      arguments:
        item: smprpg:extinguished_torch
        item-id: extinguished_torch
    settings:
      template:
        - smprpg:sound/wood
        - smprpg:hardness/none
      overrides:
        push-reaction: destroy
        replaceable: false
        map-color: 29
        luminance: 1
        item: smprpg:extinguished_torch
    state:
      state: redstone_torch[lit=false]
      entity-renderer:
        item: smprpg:extinguished_standing_torch
        scale: 1.01
    behavior:
      - type: sturdy_base_block
        direction: down
        support-types:
          - center
      - type: liquid_flowable_block
  smprpg:extinguished_wall_torch:
    loot:
      template: smprpg:loot_table/basic
      arguments:
        item: smprpg:extinguished_torch
        item-id: extinguished_torch
    settings:
      template:
        - smprpg:sound/wood
        - smprpg:hardness/none
      overrides:
        push-reaction: destroy
        replaceable: false
        map-color: 29
        luminance: 1
        item: smprpg:extinguished_torch
    behavior:
      - type: directional_attached_block
      - type: liquid_flowable_block
    states:
      properties:
        facing:
          type: horizontal_direction
      appearances:
        north:
          state: redstone_wall_torch[facing=north,lit=false]
          entity-renderer:
            item: smprpg:extinguished_wall_torch
            scale: 1.04
            yaw: 90
            translation: -0.02,0.01,0
        east:
          state: redstone_wall_torch[facing=east,lit=false]
          entity-renderer:
            item: smprpg:extinguished_wall_torch
            scale: 1.04
            yaw: 180
            translation: -0.02,0.01,0
        west:
          state: redstone_wall_torch[facing=west,lit=false]
          entity-renderer:
            item: smprpg:extinguished_wall_torch
            scale: 1.04
            translation: -0.02,0.01,0
        south:
          state: redstone_wall_torch[facing=south,lit=false]
          entity-renderer:
            item: smprpg:extinguished_wall_torch
            scale: 1.04
            yaw: -90
            translation: -0.02,0.01,0
      variants:
        facing=north:
          appearance: north
        facing=east:
          appearance: east
        facing=west:
          appearance: west
        facing=south:
          appearance: south