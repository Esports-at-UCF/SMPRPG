items:
  smprpg:cobalt_ore:
    data:
      item-name: <!i><lang:item.smprpg.cobalt_ore>
    model: smprpg:block/nether/cobalt_ore
    behavior:
      type: block_item
      block: smprpg:cobalt_ore

  smprpg:raw_cobalt_block:
    data:
      item-name: <!i><lang:item.smprpg.cobalt_block>
    model: smprpg:block/nether/raw_cobalt_block
    behavior:
      type: block_item
      block: smprpg:raw_cobalt_block

  smprpg:cobalt_block:
    data:
      item-name: <!i><lang:item.smprpg.cobalt_block>
    model: smprpg:block/nether/cobalt_block
    behavior:
      type: block_item
      block: smprpg:cobalt_block


blocks:
  smprpg:cobalt_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/cobalt_ore
    settings:
      template:
      - smprpg:settings/nether_ore
      - smprpg:data/breaking_power_6
      overrides:
        hardness: 50.0
        resistance: 25.0

  smprpg:raw_cobalt_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/raw_cobalt_block
    settings:
      template:
        - smprpg:sound/stone
        - smprpg:data/breaking_power_6
      merges:
        tags: [ "minecraft:mineable/pickaxe" ]
      overrides:
        hardness: 25.0
        resistance: 12.5

  smprpg:cobalt_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/cobalt_block
    settings:
      template:
      - smprpg:sound/cobalt
      - smprpg:data/breaking_power_6
      - smprpg:data/beacon_usable
      merges:
        tags: [ "minecraft:mineable/pickaxe" ]
      overrides:
        hardness: 25.0
        resistance: 12.5
        instrument: cow_bell

placed-features:
  smprpg:ore_cobalt:
    environment:
      - minecraft:the_nether
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 8
        targets:
          - state:
              Name: smprpg:cobalt_ore
            target:
              predicate_type: minecraft:block_match
              block: minecraft:netherrack
    placement:
      - type: minecraft:count
        count: 6
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 64
          min_inclusive:
            absolute: 16