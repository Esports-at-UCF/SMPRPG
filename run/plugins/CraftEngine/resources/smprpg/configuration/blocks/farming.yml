          appearance: stage_0
        age=1:
          appearance: stage_1
        age=2:
          appearance: stage_2
        age=3:
          appearance: stage_3
    events:
      - on: break
        functions:
          - type: run
            delay: 1
            functions:
              - type: place_block
                block-state: "minecraft:water"


