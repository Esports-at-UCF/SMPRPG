blocks:
  smprpg:super_soil:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/super_soil
    settings:
      template:
        - smprpg:settings/dirt
        - smprpg:settings/solid_1x1x1
      require-correct-tools: false
      is-randomly-ticking: true
      map-color: 10
      tags:
        - minecraft:dirt
        - minecraft:farmland
        - minecraft:dry_vegetation_may_place_on
        - minecraft:big_dripleaf_placeable
        - minecraft:grows_crops
        - minecraft:supports_crops
    behavior:
      type: smprpg:tick_accelerator
      chance: 1.0
      mode: crop
  smprpg:apple_crop:
    state:
      state: minecraft:sugar_cane[age=15]
      entity-renderer:
        item: smprpg:apple_crop_display
    settings:
      template:
        smprpg:settings/crop
      overrides:
        item: minecraft:apple
        push-reaction: destroy
        map-color: 4
    behaviors:
      - type: liquid_flowable_block
      - type: hanging_block
        stackable: false
        blacklist: false
        above-block-tags:
          - minecraft:leaves
    loot:
      pools:
        - rolls: 1
          entries:
            - type: item
              item: minecraft:apple
  smprpg:golden_apple_crop:
    state:
      state: minecraft:sugar_cane[age=15]
      entity-renderer:
        item: smprpg:golden_apple_crop_display
    settings:
      template:
        smprpg:settings/crop
      overrides:
        item: minecraft:golden_apple
        push-reaction: destroy
        map-color: 30
    behaviors:
      - type: liquid_flowable_block
      - type: hanging_block
        stackable: false
        blacklist: false
        above-blocks:
          - smprpg:golden_oak_leaves
    loot:
      pools:
        - rolls: 1
          entries:
            - type: item
              item: minecraft:golden_apple


blocks#tomato:
  smprpg:tomato_plant:
    settings:
      template:
        smprpg:settings/crop
      overrides:
        item: smprpg:tomato_seeds
        push-reaction: destroy
        map-color: 28
        is-randomly-ticking: true
    behaviors:
      - type: liquid_flowable_block
      - type: bush_block
        bottom-blocks:
          - minecraft:farmland
          - smprpg:super_soil
        bottom_block_tags:
          - minecraft:farmland
      - type: crop_block
        grow-speed: 0.125
        light-requirement: 9
        is-bone-meal-target: true
        bone-meal-age-bonus:
          type: uniform
          min: 1
          max: 2
    loot:
      pools:
        - rolls: 1
          entries:
            - type: item
              item: smprpg:tomato_seeds
    states:
      properties:
        age:
          type: int
          default: 0
          range: 0~2
      appearances:
        stage_0:
          auto-state: lower_tripwire
          models:
            - path: smprpg:block/crop/tomato_stage_0
              generation:
                parent: minecraft:block/crop
                textures:
                  cross: smprpg:block/crop/tomato_stage_0
        stage_1:
          auto-state: higher_tripwire
          models:
            - path: smprpg:block/crop/tomato_stage_1
              generation:
                parent: minecraft:block/crop
                textures:
                  cross: smprpg:block/crop/tomato_stage_1
        stage_2:
          auto-state: sugar_cane
          models:
            - path: smprpg:block/crop/tomato_stage_2
              generation:
                parent: minecraft:block/crop
                textures:
                  cross: smprpg:block/crop/tomato_stage_2
      variants:
        age=0:
          appearance: stage_0
        age=1:
          appearance: stage_1
        age=2:
          appearance: stage_2

