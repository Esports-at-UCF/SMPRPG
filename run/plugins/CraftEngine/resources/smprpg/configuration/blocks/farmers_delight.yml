blocks:
  smprpg:cutting_board:
    states:
      properties:
        facing:
          type: horizontal_direction
      appearances:
        north:
          state: minecraft:tripwire[attached=true,disarmed=false,east=false,north=false,powered=false,south=false,west=false]
          entity-renderer:
              - type: item_display
                item: smprpg:cutting_board
        south:
          state: minecraft:tripwire[attached=true,disarmed=false,east=false,north=false,powered=false,south=false,west=false]
          entity-renderer:
            - type: item_display
              item: smprpg:cutting_board
              yaw: 180
        east:
          state: minecraft:tripwire[attached=true,disarmed=false,east=false,north=false,powered=false,south=false,west=false]
          entity-renderer:
            - type: item_display
              item: smprpg:cutting_board
              yaw: 90
        west:
          state: minecraft:tripwire[attached=true,disarmed=false,east=false,north=false,powered=false,south=false,west=false]
          entity-renderer:
            - type: item_display
              item: smprpg:cutting_board
              yaw: 270
      variants:
        facing=north:
          appearance: north
        facing=east:
          appearance: east
        facing=west:
          appearance: west
        facing=south:
          appearance: south
    settings:
      template:
        - smprpg:settings/planks
        - smprpg:settings/transparent_1x1x1
      require-correct-tools: false
      map-color: 13
    behaviors:
      - type: sturdy_base_block
        direction: down
        support-types:
          - center
      - type: smprpg:cutting_board
  smprpg:cooking_pot:
    loot:
      template: smprpg:loot_table/self
    states:
      properties:
        facing:
          type: horizontal_direction
      appearances:
        north:
          state: minecraft:player_head[rotation=0]
          entity-renderer:
            - type: item_display
              item: smprpg:cooking_pot
        east:
          state: minecraft:player_head[rotation=0]
          entity-renderer:
            - type: item_display
              item: smprpg:cooking_pot
              rotation: 90
        south:
          state: minecraft:player_head[rotation=0]
          entity-renderer:
            - type: item_display
              item: smprpg:cooking_pot
              rotation: 180
        west:
          state: minecraft:player_head[rotation=0]
          entity-renderer:
            - type: item_display
              item: smprpg:cooking_pot
              rotation: 270
      variants:
        facing=north:
          appearance: north
        facing=east:
          appearance: east
        facing=south:
          appearance: south
        facing=west:
          appearance: west
    settings:
      template:
        - smprpg:settings/stone
        - smprpg:settings/transparent_1x1x1
        - smprpg:sound/lantern
      require-correct-tools: false
      map-color: 11
    behaviors:
      - type: smprpg:cooking_pot
  smprpg:kitchen_tiles:
    loot:
      template: smprpg:loot_table/self
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/decoration/kitchen_tiles
    settings:
      template:
        - smprpg:settings/stone
        - smprpg:settings/solid_1x1x1
        - smprpg:sound/stone
        - smprpg:data/breaking_power_1
      map-color: 29

