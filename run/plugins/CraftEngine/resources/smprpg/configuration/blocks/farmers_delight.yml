        up_texture: smprpg:block/cabinets/acacia_cabinet_side

blocks#cabinets:
  smprpg:acacia_cabinet:
    states:
      template: smprpg:block_state/cabinet
      arguments:
        item_closed: smprpg:acacia_cabinet
        item_open: smprpg:acacia_cabinet_open
    settings:
      template:
        - smprpg:settings/planks
        - smprpg:settings/solid_1x1x1
      require-correct-tools: false
      map-color: 15
    behaviors:
      - type: simple_storage_block
        title: "Acacia Cabinet"
        rows: 4
        sounds:
          open: minecraft:block.wooden_trapdoor.open
          close: minecraft:block.wooden_trapdoor.close
        has_signal: true
        allow_input: true
        allow_output: true
    events:
      template: smprpg:events/swing_main_hand

recipes:
  smprpg:cutting_board:
    type: shaped
    category: misc
    pattern:
      - SPP
      - SPP
    ingredients:
      S: minecraft:stick
      P: "#minecraft:planks"
    result:
      id: smprpg:cutting_board
      count: 1
  smprpg:cooking_pot:
    type: shaped
    category: misc
    pattern:
      - ISI
      - CBC
      - III
    ingredients:
      I: minecraft:iron_ingot
      C: minecraft:copper_ingot
      S: minecraft:stick
      B: minecraft:water_bucket
    result:
      id: smprpg:cooking_pot
      count: 1
  smprpg:kitchen_tiles:
    type: shaped
    category: building
    pattern:
      - BW
      - WB
    ingredients:
      B: smprpg:smoky_quartz
      W: minecraft:quartz
    result:
      id: smprpg:kitchen_tiles
      count: 1
  smprpg:rope_to_rope_coil:
    type: shaped
    category: building
    pattern:
      - RRR
      - RRR
      - RRR
    ingredients:
      R: smprpg:rope
    result:
      id: smprpg:rope_coil
      count: 1
  smprpg:rope_coil_to_rope:
    type: shapeless
    category: building
    ingredients:
      - smprpg:rope_coil
    result:
      id: smprpg:rope
      count: 9
  smprpg:rope_from_straw:
    type: shaped
    category: building
    pattern:
      - SS
      - SS
    ingredients:
      S: smprpg:straw
    result:
      id: smprpg:rope
      count: 2

