items:
  smprpg:bronze_block:
    data:
      item-name: <!i><lang:item.smprpg.bronze_block>
    model: smprpg:block/overworld/bronze_block
    behavior:
      type: block_item
      block: smprpg:bronze_block
  smprpg:steel_block:
    data:
      item-name: <!i><lang:item.smprpg.steel_block>
    model: smprpg:block/overworld/steel_block
    behavior:
      type: block_item
      block: smprpg:steel_block
  smprpg:rose_gold_block:
    data:
      item-name: <!i><lang:item.smprpg.rose_gold_block>
    model: smprpg:block/overworld/rose_gold_block
    behavior:
      type: block_item
      block: smprpg:rose_gold_block
  smprpg:dragonsteel_block:
    data:
      item-name: <!i><lang:item.smprpg.dragonsteel_block>
    model: smprpg:block/end/dragonsteel_block
    behavior:
      type: block_item
      block: smprpg:dragonsteel_block


blocks:
  smprpg:bronze_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/bronze_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_3
        - smprpg:data/beacon_usable
      overrides:
        template:
          - smprpg:sound/copper
      merges:
        tags: [ "minecraft:mineable/pickaxe", "smprpg:custom_instrument" ]
    loot:
      template:
        - smprpg:loot_table/self

  smprpg:rose_gold_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/rose_gold_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_3
        - smprpg:data/beacon_usable
    loot:
      template:
        - smprpg:loot_table/self

  smprpg:steel_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/steel_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_4
        - smprpg:data/beacon_usable
      overrides:
        template:
          - smprpg:sound/iron
      merges:
        tags: ["minecraft:mineable/pickaxe", "smprpg:custom_instrument"]
    loot:
      template:
        - smprpg:loot_table/self

  smprpg:dragonsteel_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/end/dragonsteel_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_8
        - smprpg:data/beacon_usable
        - smprpg:sound/anvil
    loot:
      template:
        - smprpg:loot_table/self