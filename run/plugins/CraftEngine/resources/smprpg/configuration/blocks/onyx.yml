items:
  smprpg:onyx_ore:
    data:
      item-name: <!i><lang:item.smprpg.onyx_ore>
    model: smprpg:block/nether/onyx_ore
    behavior:
      type: block_item
      block: smprpg:onyx_ore

  smprpg:onyx_block:
    data:
      item-name: <!i><lang:item.smprpg.onyx_block>
    model: smprpg:block/nether/onyx_block
    behavior:
      type: block_item
      block: smprpg:onyx_block


blocks:
  smprpg:onyx_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/onyx_ore
    settings:
      template:
      - smprpg:settings/nether_ore
      - smprpg:data/breaking_power_7
      overrides:
        hardness: 100.0
        resistance: 100.0

  smprpg:onyx_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/onyx_block
    settings:
      template:
        - smprpg:sound/metal
        - smprpg:data/breaking_power_6
        - smprpg:data/beacon_usable
      overrides:
        hardness: 50.0
        resistance: 100.0

placed-features:
  smprpg:ore_onyx:
    environment:
      - minecraft:the_nether
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 8
        targets:
          - state:
              Name: smprpg:onyx_ore
            target:
              predicate_type: minecraft:block_match
              block: minecraft:netherrack
    placement:
      - type: minecraft:count
        count: 6
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 72
          min_inclusive:
            absolute: 16