blocks:
  smprpg:blue_aercloud:
    state:
      id: 59
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/blue_aercloud
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/aercloud
      block-light: 0
      propagate-skylight: true
      map-color: 17
    behavior:
      - type: bouncing_block
        bounce-height: 0.5
        sync-player-position: true
        fall-damage-multiplier: 0.0
      - type: smprpg:launch_block
        launch-power: 2.0
        bubble-boosted: true
        want-particles: true
  smprpg:cold_aercloud:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/cold_aercloud
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/aercloud
      block-light: 0
      propagate-skylight: true
      map-color: 3
    behavior:
      - type: bouncing_block
        bounce-height: 0.9
        sync-player-position: true
        fall-damage-multiplier: 0.0
  smprpg:gold_aercloud:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/gold_aercloud
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:settings/aercloud
      block-light: 0
      propagate-skylight: true
      map-color: 30
    behavior:
      - type: bouncing_block
        bounce-height: 0.0
        sync-player-position: true
        fall-damage-multiplier: 0.0
  smprpg:aether_dirt:
    state:
      id: 64
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/aether_dirt
    settings:
      template:
        - smprpg:settings/dirt
        - smprpg:settings/solid_1x1x1
      require-correct-tools: false
      map-color: 23
      merges:
        tags: [ "minecraft:dirt", "smprpg:aether_dirt" ]
    behavior:
      - type: smprpg:tillable_block
        tilled-block: smprpg:aether_farmland
  smprpg:aether_grass_block:
    state:
      id: 67
      auto-state: tintable_leaves
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/aether/aether_grass_block
    settings:
      template:
        - smprpg:settings/dirt
        - smprpg:sound/grass
        - smprpg:settings/solid_1x1x1
      require-correct-tools: false
      map-color: 7
      is-randomly-ticking: true
      support-shape: minecraft:grass_block
      merges:
        tags:
          - "minecraft:dirt"
          - "smprpg:aether_dirt"
          - "minecraft:animals_spawnable_on"
          - "minecraft:grass_blocks"
      overrides:
        propagate-skylight: false
        can-occlude: true
        block-light: 15
    behavior:
      - type: surface_spreading_block
        required-light: 9
        base-block: smprpg:aether_dirt
      - type: grass_block
        feature: minecraft:grass_bonemeal
      - type: smprpg:tillable_block
        tilled-block: smprpg:aether_farmland
    properties:
      snowy:
        type: boolean
        default: false
    events:
      - on: right_click
        functions:
          - type: transform_block
            block: smprpg:enchanted_aether_grass_block
          - type: clear_item
            id: smprpg:ambrosium
            count: 1
          - type: particle
            particle: minecraft:totem_of_undying
            x: <arg:position.x> + 0.5
            y: <arg:position.y> + 1.0
            z: <arg:position.z> + 0.5
            count: 10
            speed: 0.2
          - type: play_sound
            sound: minecraft:block.amethyst_block.resonate
            target: self
            pitch: 2
            volume: 1
            source: block
        conditions:
          - type: match_item
            id: smprpg:ambrosium
  smprpg:enchanted_aether_grass_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/cube
        arguments:
          model: smprpg:block/aether/enchanted_aether_grass_block
          particle_texture: smprpg:block/aether/aether_dirt
          down_texture: smprpg:block/aether/aether_dirt
          east_texture: smprpg:block/aether/enchanted_aether_grass_block_side
          west_texture: smprpg:block/aether/enchanted_aether_grass_block_side
          north_texture: smprpg:block/aether/enchanted_aether_grass_block_side
          south_texture: smprpg:block/aether/enchanted_aether_grass_block_side
          up_texture: smprpg:block/aether/enchanted_aether_grass_block_top
    settings:
      template:
        - smprpg:settings/dirt
        - smprpg:sound/grass
        - smprpg:settings/solid_1x1x1
      require-correct-tools: false
      map-color: 18
      is-randomly-ticking: true
      support-shape: minecraft:grass_block
      merges:
        tags:
          - "minecraft:dirt"
          - "smprpg:aether_dirt"
          - "smprpg:enchanted_dirt"
          - "minecraft:grass_blocks"
    behavior:
      - type: grass_block
        feature: minecraft:grass_bonemeal
      - type: smprpg:tillable_block
        tilled-block: smprpg:aether_farmland
    properties:
      snowy:
        type: boolean
        default: false
  smprpg:aether_farmland:
    settings:
      template:
        - smprpg:settings/dirt
        - smprpg:settings/transparent_1x1x1
      require-correct-tools: false
      map-color: 23
      is-randomly-ticking: true
      support-shape: minecraft:farmland
      merges:
        tags:
          - "minecraft:dirt"
          - "smprpg:aether_dirt"
    behavior:
      - type: smprpg:farmland
        reverted-block: smprpg:aether_dirt
        hydration-blocks:
          - minecraft:water
    states:
      properties:
        moisture:
          type: int
          default: 0
          range: 0~7
      appearances:
        dry:
          auto-state: no_tint_leaves
          models:
            - path: smprpg:block/aether/aether_farmland
              generation:
                parent: minecraft:block/farmland
                textures:
                  dirt: smprpg:block/aether/aether_dirt
                  top: smprpg:block/aether/aether_farmland
        wet:
          auto-state: no_tint_leaves
          models:
            - path: smprpg:block/aether/aether_farmland_moist
              generation:
                parent: minecraft:block/farmland
                textures:
                  dirt: smprpg:block/aether/aether_dirt
                  top: smprpg:block/aether/aether_farmland_moist
      variants:
        moisture=0:
          appearance: dry
        moisture=1:
          appearance: wet
        moisture=2:
          appearance: wet
        moisture=3:
          appearance: wet
        moisture=4:
          appearance: wet
        moisture=5:
          appearance: wet
        moisture=6:
          appearance: wet
        moisture=7:
          appearance: wet
