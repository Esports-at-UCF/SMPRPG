items:
  smprpg:aether_portal:
    data:
      item-name: <!i><lang:item.smprpg.aether_portal>
    model: smprpg:block/aether/aether_portal_ns
    behavior:
      type: block_item
      block:
        states:
          properties:
            facing:
              type: 4-direction
              default: north
          appearances:
            north:
              state: cave_air
              entity-renderer:
                item: smprpg:aether_portal
            south:
              state: cave_air
              entity-renderer:
                item: smprpg:aether_portal
            east:
              state: cave_air
              entity-renderer:
                item: smprpg:aether_portal
                yaw: 90
            west:
              state: cave_air
              entity-renderer:
                item: smprpg:aether_portal
                yaw: 90
          variants:
            facing=north:
              appearance: north
            facing=south:
              appearance: south
            facing=east:
              appearance: east
            facing=west:
              appearance: west
        settings:
          template:
            - smprpg:sound/glass
          push-reaction: block
          hardness: -1
          resistance: 3600000
          block-light: 0
          propagate-skylight: true
          map-color: 17
          is-randomly-ticking: true
          luminance: 15
          tags:
            - minecraft:portals
        behavior:
          - type: smprpg:portal
            dimension: smprpg:the_aether
            sounds:
              ambient-sound: smprpg:block.aether_portal.portal
              transition-sound: smprpg:block.aether_portal.trigger
              travel-sound: smprpg:block.aether_portal.travel
