placed-features:
  smprpg:blue_aercloud:
    environment:
      - smprpg:the_aether
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 32
        targets:
          - state:
              Name: smprpg:blue_aercloud
            target:
              predicate_type: minecraft:block_match
              block: minecraft:air
    placement:
      - type: minecraft:count
        count: 1
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
