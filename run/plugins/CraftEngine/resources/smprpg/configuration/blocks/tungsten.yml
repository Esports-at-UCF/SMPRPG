items:
  smprpg:tungsten_ore:
    data:
      item-name: <!i><lang:item.smprpg.tungsten_ore>
    model: smprpg:block/nether/tungsten_ore
    behavior:
      type: block_item
      block: smprpg:tungsten_ore

  smprpg:raw_tungsten_block:
    data:
      item-name: <!i><lang:item.smprpg.tungsten_block>
    model: smprpg:block/nether/raw_tungsten_block
    behavior:
      type: block_item
      block: smprpg:raw_tungsten_block

  smprpg:tungsten_block:
    data:
      item-name: <!i><lang:item.smprpg.tungsten_block>
    model: smprpg:block/nether/tungsten_block
    behavior:
      type: block_item
      block: smprpg:tungsten_block


blocks:
  smprpg:tungsten_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/tungsten_ore
    settings:
      template:
      - smprpg:settings/nether_ore
      - smprpg:data/breaking_power_5
      overrides:
        hardness: 35.0
        resistance: 25.0

  smprpg:raw_tungsten_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/raw_tungsten_block
    settings:
      template:
        - smprpg:sound/stone
        - smprpg:data/breaking_power_5
      merges:
        tags: [ "minecraft:mineable/pickaxe" ]
      overrides:
        hardness: 25.0
        resistance: 50.0

  smprpg:tungsten_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/nether/tungsten_block
    settings:
      template:
      - smprpg:sound/iron
      - smprpg:data/breaking_power_5
      - smprpg:data/beacon_usable
      merges:
        tags: [ "minecraft:mineable/pickaxe" ]
      overrides:
        hardness: 25.0
        resistance: 50.0

placed-features:
  smprpg:ore_tungsten:
    environment:
      - minecraft:the_nether
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 12
        targets:
          - state:
              Name: smprpg:tungsten_ore
            target:
              predicate_type: minecraft:block_match
              block: minecraft:netherrack
    placement:
      - type: minecraft:count
        count: 10
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 100
          min_inclusive:
            absolute: 16