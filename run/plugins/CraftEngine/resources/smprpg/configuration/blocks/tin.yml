items:
  smprpg:tin_ore:
    data:
      item-name: <!i><lang:item.smprpg.tin_ore>
    model: smprpg:block/overworld/tin_ore
    behavior:
      type: block_item
      block: smprpg:tin_ore

  smprpg:deepslate_tin_ore:
    data:
      item-name: <!i><lang:item.smprpg.deepslate_tin_ore>
    model: smprpg:block/overworld/deepslate_tin_ore
    behavior:
      type: block_item
      block: smprpg:deepslate_tin_ore

  smprpg:raw_tin_block:
    data:
      item-name: <!i><lang:item.smprpg.raw_tin_block>
    model: smprpg:block/overworld/raw_tin_block
    behavior:
      type: block_item
      block: smprpg:raw_tin_block

  smprpg:tin_block:
    data:
      item-name: <!i><lang:item.smprpg.tin_block>
    model: smprpg:block/overworld/tin_block
    behavior:
      type: block_item
      block: smprpg:tin_block

blocks:
  smprpg:tin_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/tin_ore
    settings:
      template:
      - smprpg:settings/ore
      - smprpg:data/breaking_power_1

  smprpg:deepslate_tin_ore:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/deepslate_tin_ore
    settings:
      template:
      - smprpg:settings/deepslate_ore
      - smprpg:data/breaking_power_3

  smprpg:raw_tin_block:
    state:
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/raw_tin_block
    settings:
      template:
        - smprpg:settings/raw_metal_block
        - smprpg:data/breaking_power_1
      overrides:
        map-color: 8

  smprpg:tin_block:
    state:
      auto-state: note_block
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/tin_block
    settings:
      template:
        - smprpg:settings/metal_block
        - smprpg:data/breaking_power_1
        - smprpg:data/beacon_usable
      overrides:
        instrument: flute
        map-color: 8

placed-features:
  smprpg:ore_tin:
    environment:
      - minecraft:overworld
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 12
        targets:
          - state:
              Name: smprpg:tin_ore
            target:
              predicate_type: minecraft:tag_match
              tag: minecraft:stone_ore_replaceables
          - state:
              Name: smprpg:deepslate_tin_ore
            target:
              predicate_type: minecraft:tag_match
              tag: minecraft:deepslate_ore_replaceables
    placement:
      - type: minecraft:count
        count: 18
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:trapezoid
          max_inclusive:
            absolute: 128
          min_inclusive:
            absolute: 16