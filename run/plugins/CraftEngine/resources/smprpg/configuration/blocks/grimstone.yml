blocks:
  smprpg:grimstone:
    state:
      id: 4
      auto-state: solid
      model:
        template: smprpg:model/simplified_cube_all
        arguments:
          path: smprpg:block/overworld/grimstone
    settings:
      template:
      - smprpg:settings/grimstone
      - smprpg:data/breaking_power_5
