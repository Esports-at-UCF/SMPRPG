# Decorative Stone Blob generation
placed-features:
  smprpg:ore_basalt:
    environment:
      - minecraft:overworld
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 64
        targets:
          - state:
              Name: minecraft:smooth_basalt
            target:
              predicate_type: minecraft:block_match
              block: craftengine:custom_4
    placement:
      - type: minecraft:count
        count: 2
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:uniform
          max_inclusive:
            absolute: 0
          min_inclusive:
            above_bottom: 0

  smprpg:ore_obsidian:
    environment:
      - minecraft:overworld
    feature:
      type: minecraft:ore
      config:
        discard_chance_on_air_exposure: 0.0
        size: 64
        targets:
          - state:
              Name: minecraft:obsidian
            target:
              predicate_type: minecraft:block_match
              block: craftengine:custom_4
    placement:
      - type: minecraft:count
        count: 2
      - type: minecraft:in_square
      - type: minecraft:height_range
        height:
          type: minecraft:uniform
          max_inclusive:
            absolute: 0
          min_inclusive:
            above_bottom: 0

recipes:
  smprpg:grimstone_from_smelting_cobbled_grimstone:
    type: smelting
    experience: 0.0
    category: misc
    group: silver
    time: 200
    ingredient: smprpg:cobbled_grimstone
    result:
      id: smprpg:grimstone
      count: 1