blocks#fence:
  smprpg:golden_oak_fence:
    loot:
      template: smprpg:loot_table/self
    settings:
      template:
        - smprpg:hardness/planks
        - smprpg:sound/cherry_wood
        - smprpg:data/breaking_power_5
      overrides:
        burn-chance: 5
        fire-spread-chance: 20
        hardness: 10.0
        burnable: true
        is-suffocating: false
        is-redstone-conductor: false
        push-reaction: NORMAL
        instrument: BASS
        map-color: 22
        tags:
          - minecraft:fences
          - minecraft:mineable/axe
          - minecraft:wooden_fences
