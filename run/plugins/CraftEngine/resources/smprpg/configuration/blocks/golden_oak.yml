      type: block_item
      block:
        settings:
          template:
            - smprpg:settings/sapling
        behaviors:
          - type: liquid_flowable_block
          - type: bush_block
            bottom-blocks:
              - smprpg:enchanted_aether_grass_block
          - type: sapling_block
            feature: smprpg:golden_oak_tree
            bone-meal-success-chance: 0.45
        loot:
          template: smprpg:loot_table/self
        states:
          properties:
            stage:
              type: int
              smprpg-value: 0
              range: 0~3
          appearances:
            default:
              auto-state: sapling
              model:
                path: smprpg:block/aether/golden_oak_sapling
                generation:
                  parent: minecraft:block/cross
                  textures:
                    cross: smprpg:block/aether/golden_oak_sapling
