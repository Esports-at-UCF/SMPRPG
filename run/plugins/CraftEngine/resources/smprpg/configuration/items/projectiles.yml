items:
  smprpg:fireball_projectile:
    material: snowball
    settings:
      projectile:
        display:
          item: smprpg:fireball_projectile
          translation: 0,0,0
          rotation: 0,0,0,1
          display_transform: NONE
          scale: 1.0
        sounds:
          throw: minecraft:item.firecharge.use
          hit_entity: minecraft:item.flintandsteel.use
          hit_block: minecraft:block.fire.extinguish
        pickupable: false
        remove-on-hit: true
      tags:
        - smprpg:custom_projectiles
    data:
      item_name: <!i><lang:item.smprpg.fireball_projectile>
    model: smprpg:item/projectiles/fireball
  smprpg:damage_aura_projectile:
    material: snowball
    settings:
      projectile:
        display:
          item: smprpg:damage_aura_projectile
          translation: 0,0,0
          rotation: 0,0,0,1
          display_transform: NONE
          scale: 1.0
        sounds:
          throw: minecraft:entity.evoker.cast_spell
          hit_entity: minecraft:entity.evoker.prepare_summon
          hit_block: minecraft:entity.evoker.prepare_summon
        pickupable: false
        remove-on-hit: true
      tags:
        - smprpg:custom_projectiles
    data:
      item_name: <!i><lang:item.smprpg.damage_aura_projectile>
    model: smprpg:item/projectiles/damage_aura_projectile
  smprpg:healing_aura_projectile:
    material: snowball
    settings:
      projectile:
        display:
          item: smprpg:healing_aura_projectile
          translation: 0,0,0
          rotation: 0,0,0,1
          display_transform: NONE
          scale: 1.0
        sounds:
          throw: minecraft:entity.evoker.cast_spell
          hit_entity: minecraft:entity.evoker.prepare_summon
          hit_block: minecraft:entity.evoker.prepare_summon
        pickupable: false
        remove-on-hit: true
      tags:
        - smprpg:custom_projectiles
    data:
      item_name: <!i><lang:item.smprpg.healing_aura_projectile>
    model: smprpg:item/projectiles/healing_aura_projectile
  smprpg:conjure_block:
    data:
      item-name: <!i><lang:item.smprpg.conjure_block>
    model:
      template: smprpg:model/simplified_cube_all
      arguments:
        path: smprpg:block/misc/conjure_block
    behavior:
      type: block_item
      block: smprpg:conjure_block
  smprpg:conjure_block_damaged:
    data:
      item-name: <!i><lang:item.smprpg.conjure_block_damaged>
    model:
      template: smprpg:model/simplified_cube_all
      arguments:
        path: smprpg:block/misc/conjure_block_damaged
    behavior:
      type: block_item
      block: smprpg:conjure_block_damaged
  smprpg:neptune_trident:
    material: trident
    settings:
      projectile:
        display:
          item: smprpg:neptune_trident
          translation: 0,0,0
          rotation: 1,1,1,1
          display_transform: NONE
          scale: 0.5
        sounds:
          throw: minecraft:item.trident.throw
          hit_entity: minecraft:item.trident.hit
          hit_block: minecraft:item.trident.hit_ground
      tags:
        - smprpg:custom_projectiles
    data:
      item_name: <!i><lang:item.smprpg.neptune_trident>
    model: smprpg:item/weapons/neptune_trident_in_hand

blocks:
  smprpg:conjure_block:
    states:
      properties:
        age:
          type: int
          default: 0
          range: 0~1
      appearances:
        normal:
          state: barrier
          entity-renderer:
            item: smprpg:conjure_block
        damaged:
          state: barrier
          entity-renderer:
            item: smprpg:conjure_block_damaged
      variants:
        age=0:
          appearance: normal
        age=1:
          appearance: damaged
    settings:
      template:
        - smprpg:sound/glass
        - smprpg:hardness/none
      require-correct-tools: false
      replaceable: true
      overrides:
        push-reaction: destroy
        map-color: 24
        resistance: 6000.0
    behavior:
      type: decay_block
      decay-into: minecraft:air
      delay: 300 # 15 seconds, 30 seconds total lifespan
      chance: 1.0