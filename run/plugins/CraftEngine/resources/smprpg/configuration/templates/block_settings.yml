templates#settings:
  smprpg:settings/solid_1x1x1:
    is-suffocating: true
    replaceable: false
    is-view-blocking: true
    is-redstone-conductor: true
    can-occlude: true
  smprpg:settings/transparent_1x1x1:
    is-suffocating: false
    replaceable: false
    is-view-blocking: false
    is-redstone-conductor: false
    can-occlude: false
  smprpg:settings/sapling:
    burnable: false
    template:
      - smprpg:hardness/none
      - smprpg:sound/grass
    overrides:
      push-reaction: destroy
      is-randomly-ticking: true
      tags:
        - minecraft:mineable/axe
        - minecraft:saplings
        - minecraft:sword_efficient
  smprpg:settings/leaves:
    template:
      - smprpg:sound/grass
      - smprpg:burn_data/leaves
      - smprpg:hardness/leaves
      - smprpg:settings/transparent_1x1x1
    overrides:
      hardness: 0.2
      resistance: 0.2
      push-reaction: destroy
      instrument: harp
      tags:
        - minecraft:mineable/hoe
        - minecraft:sword_efficient
        - minecraft:leaves
        - minecraft:replaceable_by_trees
