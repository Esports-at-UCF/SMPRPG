name: Build and Attach Plugin on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # The `release` event intermittently reports github.ref_name as the
      # default branch instead of the tag (a known GitHub quirk when the
      # tag + release are created together). The release payload's tag_name
      # is the reliable source, so resolve and validate it up front.
      - name: Resolve and validate release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "::error::Release published with no tag_name in the payload. Aborting build."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag exists in repository
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' does not exist in the repository. Aborting build."
            exit 1
          fi
          echo "Verified tag '$TAG' -> $(git rev-parse "refs/tags/$TAG")"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew build
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}

      - name: Package server data
        run: zip -r server-data.zip resourcepack run

      - name: Upload plugin jar and server data to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./build/libs/*.jar
            ./server-data.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
