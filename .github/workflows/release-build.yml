name: Build and Attach Plugin on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew build
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Package server data
        run: zip -r server-data.zip resourcepack run

      - name: Upload plugin jar and server data to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./build/libs/*.jar
            ./server-data.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
